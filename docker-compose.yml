version: '3.8'

services:
  app:
    build: .
    container_name: nodejs-cicd-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-rootpass}
      - DB_NAME=${DB_NAME:-nodejs_cicd}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-change_this_jwt_secret}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  mariadb:
    image: mariadb:11.4
    container_name: nodejs-cicd-mariadb
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-rootpass}
      MARIADB_DATABASE: ${DB_NAME:-nodejs_cicd}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./docker-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nodejs-cicd-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  mariadb-data:
  redis-data:
